type: align
category: layout
profile: Core
description: |
  Aligns a single child at a specified alignment.
properties:
  alignment:
    type: "string"
    default: "\"center\""
    description: "`topStart`, `topCenter`, `topEnd`, `centerStart`, `center`, `centerEnd`, `bottomStart`, `bottomCenter`, `bottomEnd`. Defaults to `center` when omitted."
  child:
    type: "Widget"
    required: true
    description: "Aligned widget."
