type: use
category: utility
profile: Core
aliases:
  - template
  - useTemplate
description: |
  Instantiates a named template (see §9.6). `use` is canonical; `template` and `useTemplate` are accepted legacy aliases for the invocation widget type.
properties:
  template:
    type: "string"
    required: true
    description: "Template name to instantiate."
  params:
    type: "object"
    description: "Parameter values; merged with the template's declared defaults."
    aliases:
      - arguments
      - overrides
  slots:
    type: "object"
    description: "Widget subtrees keyed by slot name."
